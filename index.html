<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tirs au But - Surprise Fils</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3c32">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a3a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }
    .game-container {
      width: 100%;
      max-width: 480px;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #0f2b0f;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(0,0,0,0.8);
      flex-wrap: wrap;
      gap: 8px;
    }
    .team {
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
    }
    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid gold;
      font-size: 1.4rem;
    }
    .team-name {
      font-weight: bold;
      font-size: 0.9rem;
      max-width: 60px;
      overflow: hidden;
    }
    .score {
      font-size: 2rem;
      font-weight: bold;
      color: gold;
      margin-left: 4px;
    }
    .mode-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
      background: rgba(255,255,255,0.15);
      padding: 5px 10px;
      border-radius: 10px;
    }
    select {
      padding: 4px;
      border-radius: 5px;
      border: none;
      font-weight: bold;
    }

    .stadium {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at 50% 80%, #2e6b2e, #1a4a1a);
      transition: transform 0.8s ease;
      transform-origin: center;
    }
    .stadium.zoom-goal {
      transform: scale(1.8) translate(40px, -40px);
    }
    .stadium.zoom-keeper {
      transform: scale(1.6) translate(-50px, 10px);
    }

    .grass {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 4px),
                  repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 3px);
      pointer-events: none;
    }

    .goal {
      position: absolute;
      left: 8px; top: 10%; width: 110px; height: 65%;
      border: 8px solid white;
      border-left: none;
      border-radius: 0 30px 30px 0;
      background: rgba(0,0,0,0.4);
      box-shadow: inset 0 0 30px rgba(0,0,0,0.7);
    }
    .net {
      position: absolute;
      left: 8px; top: 10%; width: 110px; height: 65%;
      background: linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%),
                  linear-gradient(-45deg, rgba(255,255,255,0.2) 25%, transparent 25%);
      background-size: 12px 12px;
      border-radius: 0 30px 30px 0;
      pointer-events: none;
    }

    /* Joueurs */
    .player {
      position: absolute;
      z-index: 5;
      transition: left 0.5s, top 0.2s;
    }
    .striker {
      left: 65%; top: 50%;
      transform: translate(-50%, -50%);
      width: 100px; height: 140px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: bottom center;
      cursor: pointer;
      transition: transform 0.3s, filter 0.3s;
    }
    .striker.default {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140"><rect x="30" y="20" width="40" height="70" rx="10" fill="%23e74c3c"/><circle cx="50" cy="20" r="18" fill="%23f5cba7"/><rect x="25" y="70" width="8" height="35" rx="4" fill="%232c3e50"/><rect x="67" y="70" width="8" height="35" rx="4" fill="%232c3e50"/></svg>');
    }
    .goalkeeper {
      left: 80px; top: 50%;
      transform: translate(-50%, -50%);
      width: 90px; height: 130px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: bottom center;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 130"><rect x="25" y="20" width="40" height="60" rx="10" fill="%232ecc71"/><circle cx="45" cy="20" r="18" fill="%23f5cba7"/><rect x="15" y="40" width="10" height="30" rx="5" fill="%232ecc71"/><rect x="65" y="40" width="10" height="30" rx="5" fill="%232ecc71"/><rect x="25" y="80" width="7" height="30" rx="3" fill="%232c3e50"/><rect x="58" y="80" width="7" height="30" rx="3" fill="%232c3e50"/></svg>');
    }

    .ball {
      position: absolute;
      width: 24px; height: 24px;
      background: white;
      border-radius: 50%;
      border: 2px solid #000;
      box-shadow: 0 0 8px black;
      z-index: 20;
      transition: left 0.6s cubic-bezier(0.25, 0.1, 0.25, 1),
                  top 0.6s cubic-bezier(0.25, 0.1, 0.25, 1),
                  opacity 0.5s;
    }

    .draw-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 30;
      pointer-events: auto;
      touch-action: none;
    }

    .controls {
      background: rgba(0,0,0,0.85);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .instruction {
      color: white;
      text-align: center;
      font-weight: bold;
      font-size: 1rem;
    }
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .btn {
      background: #f0a500;
      border: none;
      color: #1e3c32;
      padding: 12px 20px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .btn:active { transform: scale(0.95); }
    .result-message {
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      color: gold;
      min-height: 2rem;
    }
    .shoot-history {
      display: flex;
      justify-content: center;
      gap: 5px;
      flex-wrap: wrap;
    }
    .circle {
      width: 22px; height: 22px; border-radius: 50%;
      background: gray; display: flex; align-items: center;
      justify-content: center; font-size: 0.7rem;
    }
    .circle.goal { background: #2ecc71; }
    .circle.save { background: #e74c3c; }
    input[type="file"] { display: none; }
    .replay-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; opacity: 0; z-index: 50;
      transition: opacity 0.3s;
    }
    .replay-overlay.active { opacity: 1; }

    /* Animations sur le striker */
    .striker.kick {
      transform: translate(-50%, -50%) rotate(-10deg);
    }
    .striker.celebrate {
      animation: celebrateAnim 0.6s ease;
      filter: brightness(1.2);
    }
    @keyframes celebrateAnim {
      0% { transform: translate(-50%, -50%); }
      50% { transform: translate(-50%, -65%); }
      100% { transform: translate(-50%, -50%); }
    }
    .striker.disappointed {
      transform: translate(-50%, -40%);
      filter: brightness(0.8);
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="top-bar">
    <div class="team" id="teamA">
      <div class="avatar" id="avatarA">👤</div>
      <span class="team-name" contenteditable="true" id="teamAName">Mon Fils</span>
      <span class="score" id="scoreA">0</span>
      <input type="file" id="fileInputA" accept="image/*" hidden>
    </div>
    <div class="mode-selector">
      <label for="modeSelect">Mode :</label>
      <select id="modeSelect" onchange="setMode(this.value)">
        <option value="2players">🤝 2 joueurs</option>
        <option value="shooter">⚽ Tireur (vs Ordi)</option>
        <option value="keeper">🧤 Gardien (vs Ordi)</option>
      </select>
    </div>
    <div class="team" id="teamB">
      <div class="avatar" id="avatarB">👤</div>
      <span class="team-name" contenteditable="true" id="teamBName">Adverse</span>
      <span class="score" id="scoreB">0</span>
      <input type="file" id="fileInputB" accept="image/*" hidden>
    </div>
  </div>

  <div class="stadium" id="stadium">
    <div class="grass"></div>
    <div class="goal"></div>
    <div class="net"></div>

    <div class="player striker default" id="striker"></div>
    <div class="player goalkeeper" id="goalkeeper"></div>

    <div class="ball" id="ball" style="left:70%; top:50%;"></div>
    <canvas class="draw-canvas" id="drawCanvas"></canvas>
  </div>

  <div class="controls">
    <div class="instruction" id="instruction">Trace une flèche depuis le ballon</div>
    <div class="btn-group" id="btnsDive" style="display:none;">
      <button class="btn" onclick="keeperDive('gauche')">🧤 Plonge G</button>
      <button class="btn" onclick="keeperDive('centre')">🧤 Centre</button>
      <button class="btn" onclick="keeperDive('droite')">🧤 Plonge D</button>
    </div>
    <div class="result-message" id="resultMessage"></div>
    <div class="shoot-history" id="history"></div>
    <button class="btn" onclick="resetGame()" style="background:#c0392b;color:white;">🔄 Nouveau match</button>
  </div>

  <div class="replay-overlay" id="replayOverlay"></div>
</div>

<script>
  // === Audio synth ===
  let audioCtx = null;
  function getAudioContext() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playSound(type) {
    const ctx = getAudioContext();
    if (type === 'goal') {
      playNoise(ctx, 0.8, 0.5, 0.1);
      playMelody(ctx, [523.25, 659.25, 783.99], 0.12);
    } else if (type === 'save') {
      playNoise(ctx, 0.3, 0.8, 0.1);
      playSiren(ctx, 300, 150, 0.4);
      playHooo(ctx);
    }
  }
  function playNoise(ctx, vol, dur, fade) {
    const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0; i<buf.length; i++) data[i]=(Math.random()*2-1)*vol;
    const src = ctx.createBufferSource();
    src.buffer=buf;
    const gain=ctx.createGain();
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+dur+fade);
    src.connect(gain).connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime+dur+fade);
  }
  function playMelody(ctx, freqs, dur) {
    freqs.forEach((f,i)=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type='square'; osc.frequency.value=f;
      g.gain.setValueAtTime(0.15,ctx.currentTime+i*dur);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*dur+dur*0.8);
      osc.connect(g).connect(ctx.destination);
      osc.start(ctx.currentTime+i*dur);
      osc.stop(ctx.currentTime+i*dur+dur*0.8);
    });
  }
  function playSiren(ctx, s, e, d) {
    const osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(s,ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(e,ctx.currentTime+d);
    g.gain.setValueAtTime(0.2,ctx.currentTime);
    g.gain.linearRampToValueAtTime(0,ctx.currentTime+d);
    osc.connect(g).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+d);
  }
  function playHooo(ctx) {
    const osc=ctx.createOscillator(), g=ctx.createGain(), f=ctx.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=400;
    osc.type='sawtooth'; osc.frequency.value=150;
    g.gain.setValueAtTime(0.2,ctx.currentTime);
    g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.6);
    osc.connect(f).connect(g).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.6);
  }

  // === Jeu ===
  let teamA = { name: "Mon Fils", score: 0, shots: [], avatar: null };
  let teamB = { name: "Adverse", score: 0, shots: [], avatar: null };
  let currentShooter = 'A', currentKeeper = 'B';
  let phase = 'shoot', chosenDirection = null;
  let suddenDeath = false;
  const MAX_SHOTS = 5;
  let gameMode = '2players';

  const stadium = document.getElementById('stadium');
  const ball = document.getElementById('ball');
  const strikerEl = document.getElementById('striker');
  const goalkeeperEl = document.getElementById('goalkeeper');
  const drawCanvas = document.getElementById('drawCanvas');
  const ctx = drawCanvas.getContext('2d');
  const btnsDive = document.getElementById('btnsDive');
  const instructionEl = document.getElementById('instruction');
  const resultMsg = document.getElementById('resultMessage');
  const historyDiv = document.getElementById('history');
  const replayOverlay = document.getElementById('replayOverlay');

  function resizeCanvas() {
    const rect = stadium.getBoundingClientRect();
    drawCanvas.width = rect.width;
    drawCanvas.height = rect.height;
    drawCanvas.style.width = rect.width+'px';
    drawCanvas.style.height = rect.height+'px';
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // Tracé
  let drawing = false, startX, startY, endX, endY;
  function handleStart(e) {
    if (phase !== 'shoot' || gameMode === 'keeper') return;
    e.preventDefault();
    const pos = getEventPos(e);
    const ballRect = ball.getBoundingClientRect();
    const stadiumRect = stadium.getBoundingClientRect();
    const ballX = ballRect.left + ballRect.width/2 - stadiumRect.left;
    const ballY = ballRect.top + ballRect.height/2 - stadiumRect.top;
    if (Math.hypot(pos.x - ballX, pos.y - ballY) < 60) {
      drawing = true;
      startX = pos.x; startY = pos.y;
    }
  }
  function handleMove(e) {
    if (!drawing || phase !== 'shoot') return;
    e.preventDefault();
    const pos = getEventPos(e);
    endX = pos.x; endY = pos.y;
    drawArrow();
  }
  function handleEnd(e) {
    if (!drawing || phase !== 'shoot') return;
    e.preventDefault();
    drawing = false;
    const dx = endX - startX, dy = endY - startY;
    if (Math.hypot(dx, dy) < 20) { clearCanvas(); return; }
    if (dx > -10) chosenDirection = 'centre';
    else if (dy < -25) chosenDirection = 'gauche';
    else if (dy > 25) chosenDirection = 'droite';
    else chosenDirection = 'centre';
    clearCanvas();
    // Animation kick
    strikerEl.classList.add('kick');
    setTimeout(() => strikerEl.classList.remove('kick'), 300);
    phase = 'dive';
    updateUI();
  }
  function getEventPos(e) {
    const rect = stadium.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }
  function drawArrow() {
    clearCanvas();
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = 'rgba(255,255,0,0.9)';
    ctx.lineWidth = 5;
    ctx.stroke();
    const angle = Math.atan2(endY-startY, endX-startX);
    const arrSize = 16;
    ctx.fillStyle = 'yellow';
    ctx.beginPath();
    ctx.moveTo(endX, endY);
    ctx.lineTo(endX - arrSize*Math.cos(angle-Math.PI/6), endY - arrSize*Math.sin(angle-Math.PI/6));
    ctx.lineTo(endX - arrSize*Math.cos(angle+Math.PI/6), endY - arrSize*Math.sin(angle+Math.PI/6));
    ctx.closePath();
    ctx.fill();
  }
  function clearCanvas() { ctx.clearRect(0,0,drawCanvas.width,drawCanvas.height); }

  drawCanvas.addEventListener('touchstart', handleStart, {passive: false});
  drawCanvas.addEventListener('touchmove', handleMove, {passive: false});
  drawCanvas.addEventListener('touchend', handleEnd);
  drawCanvas.addEventListener('mousedown', handleStart);
  drawCanvas.addEventListener('mousemove', (e)=>{ if(drawing)handleMove(e); });
  drawCanvas.addEventListener('mouseup', handleEnd);
  drawCanvas.addEventListener('mouseleave', ()=>{ drawing=false; clearCanvas(); });

  function keeperDive(dir) {
    if (phase !== 'dive') return;
    executeShot(dir);
  }

  function executeShot(keeperDir) {
    phase = 'anim';
    updateUI();
    if (keeperDir === 'gauche') goalkeeperEl.style.left = '40px';
    else if (keeperDir === 'droite') goalkeeperEl.style.left = '120px';
    else goalkeeperEl.style.left = '80px';

    const targets = {
      'gauche': { left: '10%', top: '15%' },
      'centre': { left: '16%', top: '50%' },
      'droite': { left: '10%', top: '85%' }
    };
    const target = targets[chosenDirection];
    ball.style.left = target.left;
    ball.style.top = target.top;
    const isGoal = (chosenDirection !== keeperDir);

    setTimeout(() => {
      if (isGoal) {
        resultMsg.textContent = '⚽ BUUUUT !';
        ball.style.opacity = '0'; ball.style.left = '5%';
        stadium.classList.add('zoom-goal');
        playSound('goal');
        strikerEl.classList.add('celebrate');
        setTimeout(()=> strikerEl.classList.remove('celebrate'), 800);
        setTimeout(()=> playReplay(target), 1000);
      } else {
        resultMsg.textContent = '🧤 Arrêt !';
        ball.style.left = '45%';
        stadium.classList.add('zoom-keeper');
        playSound('save');
        strikerEl.classList.add('disappointed');
        setTimeout(()=> strikerEl.classList.remove('disappointed'), 600);
      }
      if (currentShooter === 'A') {
        teamA.shots.push(isGoal);
        if (isGoal) teamA.score++;
      } else {
        teamB.shots.push(isGoal);
        if (isGoal) teamB.score++;
      }
      setTimeout(() => resetAfterShot(), isGoal ? 2500 : 1800);
    }, 600);
  }

  function playReplay(target) {
    replayOverlay.classList.add('active');
    ball.style.transition = 'left 1.5s ease, top 1.5s ease, opacity 0.4s';
    ball.style.left = '70%'; ball.style.top = '50%'; ball.style.opacity = '1';
    setTimeout(() => {
      ball.style.left = target.left; ball.style.top = target.top; ball.style.opacity = '0';
    }, 100);
    setTimeout(() => {
      ball.style.transition = 'left 0.6s cubic-bezier(.25,.1,.25,1), top 0.6s cubic-bezier(.25,.1,.25,1), opacity 0.5s';
      replayOverlay.classList.remove('active');
      stadium.classList.remove('zoom-goal');
    }, 2500);
  }

  function resetAfterShot() {
    ball.style.left = '70%'; ball.style.top = '50%'; ball.style.opacity = '1';
    goalkeeperEl.style.left = '80px';
    stadium.classList.remove('zoom-goal', 'zoom-keeper');
    strikerEl.classList.remove('celebrate', 'disappointed', 'kick');
    if (currentShooter === 'A') { currentShooter = 'B'; currentKeeper = 'A'; }
    else { currentShooter = 'A'; currentKeeper = 'B'; }
    if (!suddenDeath && teamA.shots.length === MAX_SHOTS && teamB.shots.length === MAX_SHOTS) {
      if (teamA.score === teamB.score) {
        suddenDeath = true;
        resultMsg.textContent = '🔥 Égalité - Mort subite !';
      } else {
        phase = 'end';
        updateUI();
        return;
      }
    }
    if (suddenDeath && teamA.shots.length === teamB.shots.length && teamA.score !== teamB.score) {
      phase = 'end';
      updateUI();
      return;
    }
    phase = 'shoot';
    resultMsg.textContent = '';
    updateUI();
  }

  function updateUI() {
    document.getElementById('scoreA').textContent = teamA.score;
    document.getElementById('scoreB').textContent = teamB.score;
    document.getElementById('teamAName').textContent = teamA.name || 'Équipe A';
    document.getElementById('teamBName').textContent = teamB.name || 'Équipe B';

    if (phase === 'shoot') {
      btnsDive.style.display = 'none';
      if (gameMode === 'keeper') {
        instructionEl.textContent = '⚽ L\'adversaire tire...';
        setTimeout(() => {
          const dirs = ['gauche','centre','droite'];
          chosenDirection = dirs[Math.floor(Math.random()*3)];
          strikerEl.classList.add('kick');
          setTimeout(() => strikerEl.classList.remove('kick'), 300);
          phase = 'dive';
          updateUI();
        }, 1000);
      } else {
        instructionEl.textContent = `⚽ Trace une flèche (${currentShooter==='A'?teamA.name:teamB.name})`;
      }
    } else if (phase === 'dive') {
      btnsDive.style.display = (gameMode === 'shooter') ? 'none' : 'flex';
      if (gameMode === 'shooter') {
        instructionEl.textContent = '🧤 Le gardien plonge...';
        setTimeout(() => {
          const dives = ['gauche','centre','droite'];
          executeShot(dives[Math.floor(Math.random()*3)]);
        }, 800);
      } else {
        instructionEl.textContent = `🧤 Gardien (${currentKeeper==='A'?teamA.name:teamB.name}) choisis`;
      }
    } else {
      btnsDive.style.display = 'none';
    }

    historyDiv.innerHTML = '';
    const maxLen = Math.max(teamA.shots.length, teamB.shots.length);
    for (let i=0; i<maxLen; i++) {
      if (teamA.shots[i] !== undefined) {
        const c = document.createElement('div');
        c.className = `circle ${teamA.shots[i]?'goal':'save'}`;
        c.textContent = 'A'+(i+1);
        historyDiv.appendChild(c);
      }
      if (teamB.shots[i] !== undefined) {
        const c = document.createElement('div');
        c.className = `circle ${teamB.shots[i]?'goal':'save'}`;
        c.textContent = 'B'+(i+1);
        historyDiv.appendChild(c);
      }
    }

    if (phase === 'end') {
      const winner = teamA.score > teamB.score ? teamA.name : (teamB.score > teamA.score ? teamB.name : null);
      if (winner) resultMsg.textContent = `🏆 ${winner} gagne !`;
    }
  }

  function setMode(mode) {
    gameMode = mode;
    resetGame();
  }

  function resetGame() {
    teamA.score = 0; teamA.shots = [];
    teamB.score = 0; teamB.shots = [];
    currentShooter = 'A'; currentKeeper = 'B';
    phase = 'shoot'; chosenDirection = null;
    suddenDeath = false;
    resultMsg.textContent = '';
    ball.style.left = '70%'; ball.style.top = '50%'; ball.style.opacity = '1';
    goalkeeperEl.style.left = '80px';
    stadium.classList.remove('zoom-goal','zoom-keeper');
    strikerEl.classList.remove('celebrate','disappointed','kick');
    updateUI();
  }

  // === Upload de la photo du fils sur le joueur ===
  const fileInputPlayer = document.getElementById('fileInputA'); // on utilise l'input de l'équipe A
  strikerEl.addEventListener('click', () => fileInputPlayer.click());
  fileInputPlayer.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      strikerEl.style.backgroundImage = `url(${dataUrl})`;
      strikerEl.classList.remove('default');
    };
    reader.readAsDataURL(file);
  });

  // Avatar de l'équipe B (optionnel)
  document.getElementById('avatarB').addEventListener('click', () => document.getElementById('fileInputB').click());
  document.getElementById('fileInputB').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('avatarB').style.backgroundImage = `url(${ev.target.result})`;
      document.getElementById('avatarB').style.backgroundSize = 'cover';
      document.getElementById('avatarB').style.backgroundPosition = 'center';
      document.getElementById('avatarB').innerHTML = '';
    };
    reader.readAsDataURL(file);
  });

  // Avatar équipe A (visage)
  document.getElementById('avatarA').addEventListener('click', () => fileInputPlayer.click());

  // Noms éditables
  document.getElementById('teamAName').addEventListener('input', function(e) {
    teamA.name = e.target.textContent.trim() || 'Équipe A';
  });
  document.getElementById('teamBName').addEventListener('input', function(e) {
    teamB.name = e.target.textContent.trim() || 'Équipe B';
  });

  resizeCanvas();
  updateUI();
</script>
</body>
</html>
