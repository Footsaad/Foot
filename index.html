<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tirs au But - Mon Fils</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3c32">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #2d5a27;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      user-select: none;
      touch-action: manipulation;
    }
    .game-container {
      width: 100%;
      max-width: 420px;
      background: #1e3c32;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }
    /* Barre supérieure */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.5);
      padding: 0.5rem;
      flex-wrap: wrap;
    }
    .team {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex: 1;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
      border: 2px solid white;
      object-fit: cover;
    }
    .team-name {
      font-weight: bold;
      color: white;
      font-size: 0.9rem;
      max-width: 70px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .score {
      font-size: 1.8rem;
      font-weight: bold;
      color: gold;
      margin-left: 0.3rem;
    }
    .mode-selector {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 0.2rem 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: white;
      font-size: 0.9rem;
    }
    select {
      padding: 0.2rem;
      border-radius: 5px;
      border: none;
      background: white;
      color: #1e3c32;
      font-weight: bold;
    }

    /* Terrain */
    .field {
      position: relative;
      width: 100%;
      height: 300px;
      background: #3a7d44;
      background-image: 
        linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px);
      background-size: 20px 20px;
      overflow: hidden;
      border-top: 4px solid #1e3c32;
      border-bottom: 4px solid #1e3c32;
    }
    .goal {
      position: absolute;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      width: 90px;
      height: 100px;
      border: 5px solid white;
      border-left: none;
      border-radius: 0 8px 8px 0;
      background: rgba(0,0,0,0.15);
    }
    /* Joueurs */
    .player {
      position: absolute;
      z-index: 10;
      transition: all 0.3s ease;
    }
    /* Attaquant */
    .striker {
      left: 65%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 70px;
    }
    .striker-body {
      position: relative;
      width: 24px;
      height: 40px;
      background: #e74c3c;
      border-radius: 4px;
      margin: 0 auto;
      top: 15px;
    }
    .striker-head {
      width: 22px;
      height: 22px;
      background: #f5cba7;
      border-radius: 50%;
      position: absolute;
      top: 0;
      left: 1px;
    }
    .striker-legs {
      display: flex;
      justify-content: space-between;
      position: absolute;
      bottom: -10px;
      width: 24px;
      left: 0;
    }
    .striker-leg {
      width: 6px;
      height: 18px;
      background: #2c3e50;
      border-radius: 2px;
      transform-origin: top;
    }
    .striker-leg.left { transform: rotate(-20deg); }
    .striker-leg.right { transform: rotate(20deg); }
    /* Gardien */
    .goalkeeper {
      left: 60px;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 70px;
    }
    .keeper-body {
      position: relative;
      width: 28px;
      height: 40px;
      background: #2ecc71;
      border-radius: 4px;
      margin: 0 auto;
      top: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .keeper-body::before {
      content: '';
      position: absolute;
      top: -10px;
      width: 26px;
      height: 22px;
      background: #f5cba7;
      border-radius: 50%;
    }
    .keeper-arms {
      position: absolute;
      top: 10px;
      width: 36px;
      display: flex;
      justify-content: space-between;
      left: -4px;
    }
    .keeper-arm {
      width: 6px;
      height: 22px;
      background: #2ecc71;
      border-radius: 2px;
      transform-origin: top;
    }
    .keeper-legs {
      display: flex;
      justify-content: space-between;
      position: absolute;
      bottom: -10px;
      width: 28px;
    }
    .keeper-leg {
      width: 6px;
      height: 20px;
      background: #2c3e50;
      border-radius: 2px;
    }
    /* Ballon */
    .ball {
      position: absolute;
      left: 70%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      border: 2px solid black;
      box-shadow: 0 0 0 2px white;
      transition: left 0.5s ease, top 0.5s ease, opacity 0.3s;
      z-index: 15;
    }
    .penalty-spot {
      position: absolute;
      top: 50%;
      left: 70%;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.5;
    }
    /* Contrôles */
    .controls {
      background: rgba(0,0,0,0.7);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .instruction {
      color: white;
      text-align: center;
      font-weight: bold;
      font-size: 1rem;
    }
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .btn {
      background: #f0a500;
      border: none;
      color: #1e3c32;
      padding: 0.7rem 1.2rem;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: 0.2s;
    }
    .btn:active {
      transform: scale(0.95);
    }
    .result-message {
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 2rem;
      color: gold;
    }
    .shoot-history {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: gray;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .circle.goal { background: #2ecc71; }
    .circle.save { background: #e74c3c; }
    .reset-btn {
      background: #c0392b;
      color: white;
      margin-top: 0.5rem;
    }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="top-bar">
    <div class="team" id="teamA">
      <div class="avatar" id="avatarA">👤</div>
      <span class="team-name" contenteditable="true" id="teamAName">Équipe A</span>
      <span class="score" id="scoreA">0</span>
      <input type="file" id="fileInputA" accept="image/*" hidden>
    </div>
    <div class="mode-selector">
      <label for="modeSelect">Mode :</label>
      <select id="modeSelect" onchange="setMode(this.value)">
        <option value="2players">🤝 2 joueurs</option>
        <option value="shooter">⚽ Tireur (vs Ordi)</option>
        <option value="keeper">🧤 Gardien (vs Ordi)</option>
      </select>
    </div>
    <div class="team" id="teamB">
      <div class="avatar" id="avatarB">👤</div>
      <span class="team-name" contenteditable="true" id="teamBName">Équipe B</span>
      <span class="score" id="scoreB">0</span>
      <input type="file" id="fileInputB" accept="image/*" hidden>
    </div>
  </div>

  <div class="field" id="field">
    <div class="goal"></div>
    <!-- Joueurs -->
    <div class="player striker" id="striker">
      <div class="striker-body">
        <div class="striker-head"></div>
        <div class="striker-legs">
          <div class="striker-leg left"></div>
          <div class="striker-leg right"></div>
        </div>
      </div>
    </div>
    <div class="player goalkeeper" id="goalkeeper">
      <div class="keeper-body">
        <div class="keeper-arms">
          <div class="keeper-arm left"></div>
          <div class="keeper-arm right"></div>
        </div>
        <div class="keeper-legs">
          <div class="keeper-leg left"></div>
          <div class="keeper-leg right"></div>
        </div>
      </div>
    </div>
    <div class="ball" id="ball"></div>
    <div class="penalty-spot"></div>
  </div>

  <div class="controls" id="controls">
    <div class="instruction" id="instruction">Choisis la direction du tir</div>
    <div class="btn-group" id="btnsShoot">
      <button class="btn" onclick="shoot('gauche')">⬅️ Gauche</button>
      <button class="btn" onclick="shoot('centre')">⬆️ Centre</button>
      <button class="btn" onclick="shoot('droite')">➡️ Droite</button>
    </div>
    <div class="btn-group" id="btnsDive" style="display:none;">
      <button class="btn" onclick="keeperDive('gauche')">🧤 Plongeon G</button>
      <button class="btn" onclick="keeperDive('centre')">🧤 Centre</button>
      <button class="btn" onclick="keeperDive('droite')">🧤 Plongeon D</button>
    </div>
    <div class="result-message" id="resultMessage"></div>
    <div class="shoot-history" id="history"></div>
    <button class="btn reset-btn" onclick="resetGame()">🔄 Nouveau match</button>
  </div>
</div>

<script>
  // État
  let teamA = { name: "Équipe A", score: 0, shots: [] };
  let teamB = { name: "Équipe B", score: 0, shots: [] };
  let currentShooter = 'A';
  let currentKeeper = 'B';
  let phase = 'shoot';
  let chosenDirection = null;
  let suddenDeath = false;
  const MAX_SHOTS = 5;
  let gameMode = '2players'; // '2players', 'shooter', 'keeper'

  // Éléments
  const ball = document.getElementById('ball');
  const keeperEl = document.getElementById('goalkeeper');
  const strikerEl = document.getElementById('striker');
  const resultMsg = document.getElementById('resultMessage');
  const instruction = document.getElementById('instruction');
  const btnsShoot = document.getElementById('btnsShoot');
  const btnsDive = document.getElementById('btnsDive');
  const historyDiv = document.getElementById('history');

  // Positions prédéfinies
  const keeperPositions = {
    'gauche': '30px',
    'centre': '60px',
    'droite': '90px'
  };
  const ballTargets = {
    'gauche': { left: '12%', top: '25%' },
    'centre': { left: '18%', top: '50%' },
    'droite': { left: '12%', top: '75%' }
  };

  function updateUI() {
    document.getElementById('scoreA').textContent = teamA.score;
    document.getElementById('scoreB').textContent = teamB.score;
    document.getElementById('teamAName').textContent = teamA.name || 'Équipe A';
    document.getElementById('teamBName').textContent = teamB.name || 'Équipe B';

    if (phase === 'shoot') {
      btnsShoot.style.display = 'flex';
      btnsDive.style.display = 'none';
      instruction.textContent = `⚽ Tir de ${currentShooter === 'A' ? teamA.name : teamB.name}`;
      // Si mode gardien, le tir est automatique
      if (gameMode === 'keeper') {
        btnsShoot.style.display = 'none';
        instruction.textContent = '⚽ L\'attaquant se prépare... (tir automatique)';
        setTimeout(autoShoot, 800);
      }
    } else if (phase === 'dive') {
      btnsShoot.style.display = 'none';
      btnsDive.style.display = 'flex';
      const keeperTeam = currentKeeper === 'A' ? teamA.name : teamB.name;
      instruction.textContent = `🧤 Gardien (${keeperTeam}) choisit le plongeon`;
      // Si mode tireur, le gardien plonge automatiquement
      if (gameMode === 'shooter') {
        btnsDive.style.display = 'none';
        instruction.textContent = '🧤 Le gardien plonge... (automatique)';
        setTimeout(autoDive, 600);
      }
    } else if (phase === 'anim') {
      btnsShoot.style.display = 'none';
      btnsDive.style.display = 'none';
      instruction.textContent = '';
    } else if (phase === 'end') {
      btnsShoot.style.display = 'none';
      btnsDive.style.display = 'none';
    }

    // Historique
    historyDiv.innerHTML = '';
    const maxLen = Math.max(teamA.shots.length, teamB.shots.length);
    for (let i = 0; i < maxLen; i++) {
      if (teamA.shots[i] !== undefined) {
        const c = document.createElement('div');
        c.className = `circle ${teamA.shots[i] ? 'goal' : 'save'}`;
        c.textContent = 'A'+(i+1);
        historyDiv.appendChild(c);
      }
      if (teamB.shots[i] !== undefined) {
        const c = document.createElement('div');
        c.className = `circle ${teamB.shots[i] ? 'goal' : 'save'}`;
        c.textContent = 'B'+(i+1);
        historyDiv.appendChild(c);
      }
    }
    checkEndGame();
  }

  function shoot(dir) {
    if (phase !== 'shoot') return;
    chosenDirection = dir;
    // Petite animation de l'attaquant
    strikerEl.style.transform = 'translate(-55%, -50%) rotate(-10deg)';
    setTimeout(() => { strikerEl.style.transform = 'translate(-50%, -50%) rotate(0)'; }, 200);
    phase = 'dive';
    updateUI();
  }

  function keeperDive(keeperDir) {
    if (phase !== 'dive') return;
    executeShot(keeperDir);
  }

  function executeShot(keeperDir) {
    phase = 'anim';
    updateUI();
    // Déplacer gardien
    keeperEl.style.left = keeperPositions[keeperDir];
    // Déplacer ballon
    const target = ballTargets[chosenDirection];
    ball.style.left = target.left;
    ball.style.top = target.top;

    const isGoal = (chosenDirection !== keeperDir);
    setTimeout(() => {
      if (isGoal) {
        resultMsg.textContent = '⚽ BUUUUT !';
        ball.style.opacity = '0';
        ball.style.left = '5%';
      } else {
        resultMsg.textContent = '🧤 Arrêt !';
        ball.style.left = '40%';
      }
      // Mettre à jour les scores
      if (currentShooter === 'A') {
        teamA.shots.push(isGoal);
        if (isGoal) teamA.score++;
      } else {
        teamB.shots.push(isGoal);
        if (isGoal) teamB.score++;
      }
      setTimeout(() => {
        resetPositions();
        // Passer à l'autre équipe
        if (currentShooter === 'A') {
          currentShooter = 'B';
          currentKeeper = 'A';
        } else {
          currentShooter = 'A';
          currentKeeper = 'B';
        }
        // Gérer fin de match
        if (!suddenDeath && teamA.shots.length === MAX_SHOTS && teamB.shots.length === MAX_SHOTS) {
          if (teamA.score === teamB.score) {
            suddenDeath = true;
            resultMsg.textContent = '🔥 Égalité - Mort subite !';
          } else {
            phase = 'end';
            updateUI();
            return;
          }
        }
        if (suddenDeath && teamA.shots.length === teamB.shots.length && teamA.score !== teamB.score) {
          phase = 'end';
          updateUI();
          return;
        }
        phase = 'shoot';
        resultMsg.textContent = '';
        updateUI();
      }, 700);
    }, 500);
  }

  function autoShoot() {
    const directions = ['gauche', 'centre', 'droite'];
    const randomDir = directions[Math.floor(Math.random() * 3)];
    shoot(randomDir);
  }

  function autoDive() {
    const dirs = ['gauche', 'centre', 'droite'];
    const randomDive = dirs[Math.floor(Math.random() * 3)];
    executeShot(randomDive);
  }

  function resetPositions() {
    ball.style.left = '70%';
    ball.style.top = '50%';
    ball.style.opacity = '1';
    keeperEl.style.left = '60px';
    strikerEl.style.transform = 'translate(-50%, -50%)';
  }

  function checkEndGame() {
    if (phase === 'end') {
      let winner;
      if (teamA.score > teamB.score) winner = teamA.name;
      else if (teamB.score > teamA.score) winner = teamB.name;
      if (winner) {
        resultMsg.textContent = `🏆 ${winner} remporte le match !`;
      }
    }
  }

  function setMode(mode) {
    gameMode = mode;
    // Réinitialiser la partie en cours pour éviter les incohérences
    resetGame();
  }

  function resetGame() {
    teamA.score = 0;
    teamA.shots = [];
    teamB.score = 0;
    teamB.shots = [];
    currentShooter = 'A';
    currentKeeper = 'B';
    phase = 'shoot';
    chosenDirection = null;
    suddenDeath = false;
    resultMsg.textContent = '';
    resetPositions();
    updateUI();
  }

  // Avatars
  function setupAvatar(avatarEl, fileInput) {
    avatarEl.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          avatarEl.style.backgroundImage = `url(${ev.target.result})`;
          avatarEl.style.backgroundSize = 'cover';
          avatarEl.style.backgroundPosition = 'center';
          avatarEl.innerHTML = '';
        };
        reader.readAsDataURL(file);
      }
    });
  }
  setupAvatar(document.getElementById('avatarA'), document.getElementById('fileInputA'));
  setupAvatar(document.getElementById('avatarB'), document.getElementById('fileInputB'));

  document.getElementById('teamAName').addEventListener('input', function(e) {
    teamA.name = e.target.textContent.trim() || 'Équipe A';
  });
  document.getElementById('teamBName').addEventListener('input', function(e) {
    teamB.name = e.target.textContent.trim() || 'Équipe B';
  });

  // Initialisation
  updateUI();
</script>
</body>
</html>
