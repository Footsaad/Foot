<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tirs au But - Mon Fils</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3c32">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #2d5a27;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      user-select: none;
      touch-action: manipulation;
    }
    .game-container {
      width: 100%;
      max-width: 400px;
      background: #1e3c32;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    /* Bandeau du haut (scores + avatars) */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.5);
      padding: 0.5rem 1rem;
    }
    .team {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .team-info {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      border: 2px solid white;
      object-fit: cover;
    }
    .avatar.placeholder {
      background: #777;
      color: white;
    }
    .team-name {
      font-weight: bold;
      color: white;
      font-size: 1rem;
      max-width: 80px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .score {
      font-size: 2rem;
      font-weight: bold;
      color: gold;
      margin-left: 0.5rem;
    }

    /* Terrain */
    .field {
      position: relative;
      width: 100%;
      height: 350px;
      background: #3a7d44;
      background-image: 
        linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px);
      background-size: 20px 20px;
      overflow: hidden;
      border-top: 4px solid #1e3c32;
      border-bottom: 4px solid #1e3c32;
    }

    /* But */
    .goal {
      position: absolute;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      width: 100px;
      height: 120px;
      border: 6px solid white;
      border-left: none;
      border-radius: 0 10px 10px 0;
      background: rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .goal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px);
    }

    /* Gardien */
    .keeper {
      position: absolute;
      top: 50%;
      left: 50px;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      transition: left 0.3s ease-out;
      z-index: 10;
      pointer-events: none;
    }

    /* Ballon */
    .ball {
      position: absolute;
      top: 50%;
      left: 70%;
      transform: translate(-50%, -50%);
      font-size: 2.5rem;
      transition: left 0.4s ease-in, top 0.4s ease-in, opacity 0.3s;
      z-index: 5;
    }

    /* Point de penalty */
    .penalty-spot {
      position: absolute;
      top: 50%;
      left: 70%;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.5;
    }

    /* Zone de tir */
    .shoot-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: space-around;
      align-items: center;
      pointer-events: none;
    }

    /* Surfaces de but */
    .goal-area {
      position: absolute;
      top: 10%;
      left: 20px;
      width: 80px;
      height: 80%;
      border: 2px dashed rgba(255,255,255,0.4);
      border-left: none;
    }

    /* Contrôles */
    .controls {
      background: rgba(0,0,0,0.7);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .instruction {
      color: white;
      text-align: center;
      font-weight: bold;
      font-size: 1.1rem;
    }
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .btn {
      background: #f0a500;
      border: none;
      color: #1e3c32;
      padding: 0.7rem 1.2rem;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: 0.2s;
    }
    .btn:active {
      transform: scale(0.95);
    }
    .result-message {
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
      min-height: 2rem;
      color: gold;
    }
    .shoot-history {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .circle {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: gray;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .circle.goal { background: #2ecc71; }
    .circle.save { background: #e74c3c; }
    .reset-btn {
      background: #c0392b;
      color: white;
      margin-top: 0.5rem;
    }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
<div class="game-container">
  <!-- Barre supérieure -->
  <div class="top-bar">
    <div class="team" id="teamA">
      <div class="avatar placeholder" id="avatarA">👤</div>
      <div class="team-info">
        <span class="team-name" contenteditable="true" id="teamAName">Équipe A</span>
        <span class="score" id="scoreA">0</span>
      </div>
      <input type="file" id="fileInputA" accept="image/*" hidden>
    </div>
    <div class="team" id="teamB">
      <div class="avatar placeholder" id="avatarB">👤</div>
      <div class="team-info">
        <span class="team-name" contenteditable="true" id="teamBName">Équipe B</span>
        <span class="score" id="scoreB">0</span>
      </div>
      <input type="file" id="fileInputB" accept="image/*" hidden>
    </div>
  </div>

  <!-- Terrain -->
  <div class="field" id="field">
    <div class="goal-area"></div>
    <div class="goal"></div>
    <div class="keeper" id="keeper">🧤</div>
    <div class="ball" id="ball">⚽</div>
    <div class="penalty-spot"></div>
  </div>

  <!-- Contrôles -->
  <div class="controls" id="controls">
    <div class="instruction" id="instruction">Choisis la direction du tir</div>
    <div class="btn-group" id="btnsShoot">
      <button class="btn" onclick="shoot('gauche')">⬅️ Gauche</button>
      <button class="btn" onclick="shoot('centre')">⬆️ Centre</button>
      <button class="btn" onclick="shoot('droite')">➡️ Droite</button>
    </div>
    <div class="btn-group" id="btnsDive" style="display:none;">
      <button class="btn" onclick="keeperDive('gauche')">🧤 Plongeon Gauche</button>
      <button class="btn" onclick="keeperDive('centre')">🧤 Reste au centre</button>
      <button class="btn" onclick="keeperDive('droite')">🧤 Plongeon Droite</button>
    </div>
    <div class="result-message" id="resultMessage"></div>
    <div class="shoot-history" id="history"></div>
    <button class="btn reset-btn" onclick="resetGame()">🔄 Nouveau match</button>
  </div>
</div>

<script>
  // État du jeu
  let teamA = { name: "Équipe A", score: 0, shots: [] };
  let teamB = { name: "Équipe B", score: 0, shots: [] };
  let currentShooter = 'A';   // équipe qui tire
  let currentKeeper = 'B';    // équipe qui défend
  let phase = 'shoot';        // 'shoot', 'dive', 'anim', 'end'
  let chosenDirection = null;
  let suddenDeath = false;
  const MAX_SHOTS = 5;

  // Éléments DOM
  const ball = document.getElementById('ball');
  const keeper = document.getElementById('keeper');
  const resultMsg = document.getElementById('resultMessage');
  const instruction = document.getElementById('instruction');
  const btnsShoot = document.getElementById('btnsShoot');
  const btnsDive = document.getElementById('btnsDive');
  const historyDiv = document.getElementById('history');

  // Positions du ballon (cibles)
  const ballPositions = {
    'gauche': { left: '15%', top: '30%' },
    'centre': { left: '25%', top: '50%' },
    'droite': { left: '15%', top: '70%' }
  };
  // Positions du gardien (plongeons)
  const keeperPositions = {
    'gauche': '20px',
    'centre': '50px',
    'droite': '80px'
  };

  function updateUI() {
    document.getElementById('scoreA').textContent = teamA.score;
    document.getElementById('scoreB').textContent = teamB.score;
    document.getElementById('teamAName').textContent = teamA.name || 'Équipe A';
    document.getElementById('teamBName').textContent = teamB.name || 'Équipe B';

    if (phase === 'shoot') {
      btnsShoot.style.display = 'flex';
      btnsDive.style.display = 'none';
      instruction.textContent = `⚽ ${teamA.name} tire !`; // ou teamB
      if (currentShooter === 'B') instruction.textContent = `⚽ ${teamB.name} tire !`;
    } else if (phase === 'dive') {
      btnsShoot.style.display = 'none';
      btnsDive.style.display = 'flex';
      const keeperTeam = currentKeeper === 'A' ? teamA.name : teamB.name;
      instruction.textContent = `🧤 Gardien (${keeperTeam}) choisis ton plongeon`;
    } else if (phase === 'anim') {
      btnsShoot.style.display = 'none';
      btnsDive.style.display = 'none';
      instruction.textContent = '';
    } else if (phase === 'end') {
      btnsShoot.style.display = 'none';
      btnsDive.style.display = 'none';
    }

    // Historique
    historyDiv.innerHTML = '';
    const maxLen = Math.max(teamA.shots.length, teamB.shots.length);
    for (let i = 0; i < maxLen; i++) {
      if (teamA.shots[i] !== undefined) {
        const c = document.createElement('div');
        c.className = `circle ${teamA.shots[i] ? 'goal' : 'save'}`;
        c.textContent = 'A'+(i+1);
        historyDiv.appendChild(c);
      }
      if (teamB.shots[i] !== undefined) {
        const c = document.createElement('div');
        c.className = `circle ${teamB.shots[i] ? 'goal' : 'save'}`;
        c.textContent = 'B'+(i+1);
        historyDiv.appendChild(c);
      }
    }

    checkEndGame();
  }

  function shoot(dir) {
    if (phase !== 'shoot') return;
    chosenDirection = dir;
    phase = 'dive';
    updateUI();
  }

  function keeperDive(keeperDir) {
    if (phase !== 'dive') return;
    // Bloquer les boutons
    phase = 'anim';
    updateUI();

    // Déplacer le gardien
    keeper.style.left = keeperPositions[keeperDir];

    // Déplacer le ballon vers la cible du tir
    const target = ballPositions[chosenDirection];
    ball.style.left = target.left;
    ball.style.top = target.top;

    // Vérifier but ou arrêt
    const isGoal = (chosenDirection !== keeperDir);
    
    // Attendre la fin de l'animation pour afficher le résultat
    setTimeout(() => {
      if (isGoal) {
        resultMsg.textContent = '⚽ BUUUUT !';
        // Le ballon continue dans le but (disparaît)
        ball.style.opacity = '0';
        ball.style.left = '5%';
        ball.style.top = target.top;
      } else {
        resultMsg.textContent = '🧤 Arrêt du gardien !';
        // Le ballon rebondit
        ball.style.left = '40%';
        ball.style.top = target.top;
        ball.style.opacity = '1';
      }

      // Mettre à jour les scores
      if (currentShooter === 'A') {
        teamA.shots.push(isGoal);
        if (isGoal) teamA.score++;
      } else {
        teamB.shots.push(isGoal);
        if (isGoal) teamB.score++;
      }

      // Réinitialiser le ballon et le gardien après un court délai
      setTimeout(() => {
        resetPositions();
        // Passer à l'équipe suivante
        if (currentShooter === 'A') {
          currentShooter = 'B';
          currentKeeper = 'A';
        } else {
          currentShooter = 'A';
          currentKeeper = 'B';
        }

        // Vérifier si on passe en mort subite
        if (!suddenDeath && teamA.shots.length === MAX_SHOTS && teamB.shots.length === MAX_SHOTS) {
          if (teamA.score === teamB.score) {
            suddenDeath = true;
            resultMsg.textContent = '🔥 Égalité ! Mort subite...';
          } else {
            phase = 'end';
            updateUI();
            return;
          }
        }

        if (suddenDeath && teamA.shots.length === teamB.shots.length && teamA.score !== teamB.score) {
          phase = 'end';
          updateUI();
          return;
        }

        phase = 'shoot';
        resultMsg.textContent = '';
        updateUI();
      }, 600);
    }, 400);
  }

  function resetPositions() {
    // Remettre ballon au point de penalty
    ball.style.left = '70%';
    ball.style.top = '50%';
    ball.style.opacity = '1';
    // Gardien au centre
    keeper.style.left = '50px';
  }

  function checkEndGame() {
    if (phase === 'end') {
      let winner;
      if (teamA.score > teamB.score) winner = teamA.name;
      else if (teamB.score > teamA.score) winner = teamB.name;
      if (winner) {
        resultMsg.textContent = `🏆 ${winner} remporte le match !`;
      }
    }
  }

  function resetGame() {
    teamA.score = 0;
    teamA.shots = [];
    teamB.score = 0;
    teamB.shots = [];
    currentShooter = 'A';
    currentKeeper = 'B';
    phase = 'shoot';
    chosenDirection = null;
    suddenDeath = false;
    resultMsg.textContent = '';
    resetPositions();
    updateUI();
  }

  // Gestion des avatars (photo du fils)
  function setupAvatar(avatarElement, fileInput) {
    avatarElement.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          avatarElement.style.backgroundImage = `url(${ev.target.result})`;
          avatarElement.style.backgroundSize = 'cover';
          avatarElement.style.backgroundPosition = 'center';
          avatarElement.innerHTML = '';
          avatarElement.classList.remove('placeholder');
        };
        reader.readAsDataURL(file);
      }
    });
  }
  setupAvatar(document.getElementById('avatarA'), document.getElementById('fileInputA'));
  setupAvatar(document.getElementById('avatarB'), document.getElementById('fileInputB'));

  // Édition des noms
  document.getElementById('teamAName').addEventListener('input', function(e) {
    teamA.name = e.target.textContent.trim() || 'Équipe A';
  });
  document.getElementById('teamBName').addEventListener('input', function(e) {
    teamB.name = e.target.textContent.trim() || 'Équipe B';
  });

  // Initialisation
  updateUI();
</script>
</body>
</html>
